<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taxidermy Services</title>
    <link rel="stylesheet" href="css/taxidermy.css" />
    <script src="js/conroe.js"></script>
    <script src="js/jquery-3.4.1.min.js"></script>
    <style>
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .animal-card {
            background: #fff;
            border: 1px solid #e0ddd8;
            border-radius: 10px;
            overflow: hidden;
            transition: box-shadow 0.15s, border-color 0.15s;
            cursor: pointer;
        }

        .animal-card:hover {
            border-color: #bbb;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .animal-card img {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            display: block;
            background: #eee;
        }

        .animal-card .label {
            font-size: 12px;
            font-weight: 500;
            color: #1a1a1a;
            padding: 8px 10px;
            line-height: 1.35;
        }
    </style>
</head>
<body>

<header>
  <h1>Taxidermy Services</h1>
  <p>We offer full-mount, shoulder-mount, and European skull taxidermy for over 60 species. Each mount is handcrafted to preserve your trophy for generations.</p>
</header>

<main>
    <div id="content"></div>
</main>

<footer>
  &copy; 2026 Your Taxidermy Studio &mdash; Contact us to discuss your mount
</footer>

<script>
    makeGrids();
</script>

</body>
</html>
