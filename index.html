<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a18;
      --paper: #f5f0e8;
      --cream: #ede8dc;
      --accent: #b85c2a;
      --muted: #8a8578;
      --border: #d4cfc4;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Subtle grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .page {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 960px;
      width: 100%;
      background: white;
      border: 1px solid var(--border);
      box-shadow: 8px 8px 0 var(--cream), 9px 9px 0 var(--border);
    }

    /* Left panel */
    .left {
      background: var(--ink);
      color: var(--paper);
      padding: 4rem 3rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .left::after {
      content: '';
      position: absolute;
      bottom: -60px;
      left: -60px;
      width: 220px;
      height: 220px;
      border: 40px solid rgba(255,255,255,0.04);
      border-radius: 50%;
    }

    .left::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 160px;
      height: 160px;
      border: 30px solid rgba(255,255,255,0.04);
      border-radius: 50%;
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      line-height: 1.1;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }

    .brand em {
      display: block;
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
    }

    .tagline {
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.45);
      margin-top: 0.75rem;
      font-weight: 300;
    }

    .left-body {
      position: relative;
      z-index: 1;
    }

    .left-body p {
      font-size: 0.95rem;
      line-height: 1.75;
      color: rgba(245,240,232,0.7);
      font-weight: 300;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--accent);
      margin: 1.5rem 0;
    }

    .info-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .info-item .icon {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      flex-shrink: 0;
      opacity: 0.5;
    }

    .info-item span {
      font-size: 0.875rem;
      color: rgba(245,240,232,0.6);
      font-weight: 300;
    }

    /* Right panel */
    .right {
      padding: 4rem 3rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-heading {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 0.35rem;
    }

    .form-sub {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
      font-weight: 300;
    }

    .field {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    input, textarea {
      width: 100%;
      background: var(--paper);
      border: 1px solid var(--border);
      padding: 0.75rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      border-radius: 0;
      -webkit-appearance: none;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 3px 3px 0 rgba(184,92,42,0.12);
    }

    textarea {
      resize: vertical;
      min-height: 110px;
    }

    .btn {
      width: 100%;
      padding: 0.9rem 1.5rem;
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: var(--accent);
      box-shadow: 3px 3px 0 rgba(184,92,42,0.3);
    }

    .btn:active { transform: translateY(1px); }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      display: none;
      border-left: 3px solid;
    }

    .status.success {
      display: block;
      border-color: #4a7c59;
      background: #f0f7f2;
      color: #2d5a3d;
    }

    .status.error {
      display: block;
      border-color: var(--accent);
      background: #fdf5f0;
      color: #8a3210;
    }

    /* Animation */
    .page { animation: rise 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .field { animation: fadein 0.5s both; }
    .field:nth-child(1) { animation-delay: 0.15s; }
    .field:nth-child(2) { animation-delay: 0.22s; }
    .field:nth-child(3) { animation-delay: 0.29s; }
    .field:nth-child(4) { animation-delay: 0.36s; }

    @keyframes fadein {
      from { opacity: 0; transform: translateX(10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Responsive */
    @media (max-width: 680px) {
      .page { grid-template-columns: 1fr; }
      .left { padding: 2.5rem 2rem; }
      .right { padding: 2.5rem 2rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- Left info panel -->
    <div class="left">
      <div>
        <div class="brand">Get in<br><em>Touch.</em></div>
        <div class="tagline">We'd love to hear from you</div>
      </div>

      <div class="left-body">
        <p>Have a question, a project in mind, or just want to say hello? Fill out the form and we'll get back to you as soon as possible.</p>
        <div class="divider"></div>

        <div class="info-item">
          <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
          </svg>
          <span>hello@yoursite.com</span>
        </div>

        <div class="info-item">
          <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span>Mon–Fri, 9am–5pm CT</span>
        </div>
      </div>
    </div>

    <!-- Right form panel -->
    <div class="right">
      <div class="form-heading">Send a message</div>
      <div class="form-sub">We typically reply within one business day.</div>

      <form id="contact-form">
        <!-- Web3Forms access key — replace with yours from web3forms.com -->
        <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE"/>
        <input type="hidden" name="subject" value="New message from your website"/>
        <input type="checkbox" name="botcheck" style="display:none"/>

        <div class="field">
          <label for="name">Your name</label>
          <input type="text" id="name" name="name" placeholder="Jane Smith" required/>
        </div>

        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="jane@example.com" required/>
        </div>

        <div class="field">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject_line" placeholder="What's this about?"/>
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Tell us what's on your mind…" required></textarea>
        </div>

        <button type="submit" class="btn" id="submit-btn">Send Message</button>
        <div class="status" id="status-msg"></div>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('contact-form');
    const btn  = document.getElementById('submit-btn');
    const msg  = document.getElementById('status-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Sending…';
      msg.className = 'status';
      msg.style.display = 'none';

      const data = Object.fromEntries(new FormData(form));

      try {
        const res = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify(data)
        });
        const json = await res.json();

        if (json.success) {
          msg.textContent = '✓ Message sent! We\'ll be in touch soon.';
          msg.className = 'status success';
          form.reset();
        } else {
          throw new Error(json.message || 'Submission failed');
        }
      } catch (err) {
        msg.textContent = '✗ Something went wrong. Please try again or email us directly.';
        msg.className = 'status error';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Message';
      }
    });
  </script>
</body>
</html>
