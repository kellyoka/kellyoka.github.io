        function polarToCartesian(centerX, centerY, radius, angleInDegrees) {
            var angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;

            return {
                x: centerX + Math.round((radius * Math.cos(angleInRadians)) * 100) / 100,
                y: centerY + Math.round((radius * Math.sin(angleInRadians)) * 100) / 100
            };
        }

        function describeArc(x, y, radius, startAngle, endAngle) {
            var start = polarToCartesian(x, y, radius, endAngle);
            var end = polarToCartesian(x, y, radius, startAngle);

            var largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";

            var d = [
                "M", start.x, start.y,
                "A", radius, radius, 0, largeArcFlag, 0, end.x, end.y
            ].join(" ");

            return d;
        }

        function getOffset(el) {
            var rect = el.getBoundingClientRect();
            return {
                left: rect.left + window.pageXOffset,
                top: rect.top + window.pageYOffset,
                width: rect.width || el.offsetWidth,
                height: rect.height || el.offsetHeight
            };
        }

        function connect(x1, y1, x2, y2) { // draw a line connecting elements
            // distance
            var length = Math.sqrt(((x2 - x1) * (x2 - x1)) + ((y2 - y1) * (y2 - y1)));
            // center
            var cx = ((x1 + x2) / 2) - (length / 2);
            var cy = ((y1 + y2) / 2) - (1 / 2);
            // angle
            var angle = Math.atan2((y1 - y2), (x1 - x2)) * (180 / Math.PI);
            // make hr
            var htmlLine = '<div style="height:1px;background-color:black;position:absolute;left:' + cx + 'px;top:' + cy + 'px;width:' + length + 'px;';
            htmlLine += '-moz-transform:rotate(' + angle + 'deg);-webkit-transform:rotate(' + angle + 'deg);-o-transform:rotate(' + angle + 'deg);';
            htmlLine += '-ms-transform:rotate(' + angle + 'deg);transform:rotate(' + angle + 'deg);"/>';
            //
            // alert(htmlLine);
            return htmlLine;
        }


        function writeLine(arc, range) {
            // assume 200, 200 start point
            var x = range * Math.cos(arc * (Math.PI / 180)) + 200;
            var y = range * Math.sin(arc * (Math.PI / 180)) + 200;

            var s = connect(200, 200, x, y);

            var str = '<div>r=' + range + ' a=' + arc + ' x=' + x + ' y=' + y + '</div>';
            $('#dataDiv').append(str);
            return s;
        }

        function findHex(x, y) {
            var xh = Math.floor((x - 6) / 37.5) + 1;
            var yh = Math.floor(((y - 4) - (((xh % 2 == 1) ? 0 : 1) * 20)) / 43.3) + 1;
            var h = xh + ' ' + yh;
            return h;
        }


        // draw hex map & grid numbers
        var HexA = 2 * Math.PI / 6;
        var HexR = 25;
        function drawHexagon(x, y) {
            ctx.beginPath();
            for (var i = 0; i < 6; i++) {
                ctx.lineTo(x + HexR * Math.cos(HexA * i), y + HexR * Math.sin(HexA * i));
            }
            ctx.closePath();
            ctx.stroke();
        }
        function drawGrid(width, height) {
            //for (let y = r; y + r * 2 * Math.sin(a) < height; y += r * 2 * Math.sin(a)) {
            for (let y = HexR; y + HexR * Math.sin(HexA) < height; y += HexR * Math.sin(HexA)) {
                for (let x = HexR, j = 0; x + HexR * (1 + Math.cos(HexA)) < width; x += HexR * (1 + Math.cos(HexA)), y += (-1) ** j++ * HexR * Math.sin(HexA)) {
                    drawHexagon(x, y);
                }
            }
        }

        function turnShip(sId, t) {
            var arrId1 = -1;
            for (var z = 0; z < shipList.length; z++) {
                if (shipList[z].userId == sId) { arrId1 = z; }
            }
            var f = shipList[arrId1].facing;
            f += ((t == -1) ? -60 : 60);
            if (f > 300) f = 0;
            if (f < 0) f = 300;
            shipList[arrId1].facing = f;
            shipList[arrId1].turnMarker = -1;
            shipList[arrId1].sideSlip = true;

            $('#turnDetailsDiv').append('turn ' + ((t == -1) ? 'left' : 'right'));
            moveShip(sId, 0);
        }
        function moveShip(sId, m) {
            var arrId1 = -1;
            for (var z = 0; z < shipList.length; z++) {
                if (shipList[z].userId == sId) { arrId1 = z; }
            }
            var f = shipList[arrId1].facing;
            var x = shipList[arrId1].xCord;
            var y = shipList[arrId1].yCord;
            var a = 1;
            if (f == 60) a = 2;
            if (f == 120) a = 3;
            if (f == 180) a = 4;
            if (f == 240) a = 5;
            if (f == 300) a = 6;
            a += m;
            shipList[arrId1].sideSlip = ((m != 0) ? false : true);
            shipList[arrId1].turnMarker++;

            if (a == 1 || a == 7) { shipList[arrId1].yCord = (y - 1); }
            if (a == 2) { shipList[arrId1].xCord = (x + 1); shipList[arrId1].yCord = ((x % 2 == 0) ? y : (y - 1)); }
            if (a == 3) { shipList[arrId1].xCord = (x + 1); shipList[arrId1].yCord = ((x % 2 == 0) ? (y + 1) : y); }
            if (a == 4) { shipList[arrId1].yCord = (y + 1); }
            if (a == 5) { shipList[arrId1].xCord = (x - 1); shipList[arrId1].yCord = ((x % 2 == 0) ? (y + 1) : y); }
            if (a == 6 || a == 0) { shipList[arrId1].xCord = (x - 1); shipList[arrId1].yCord = ((x % 2 == 0) ? y : (y - 1)); }
            plotShip(sId);

            if (m != 0) $('#turnDetailsDiv').append(((m == -1) ? 'slip left' : 'slip right'));
            $('#turnDetailsDiv').append('</div>');
            $('#moveShipPopUpDiv').css('display', 'none');
            $('.posShipMove').remove();
            moveShipList.shift();
            moveShips();
        }

        function potentialMove(sId, m, t) {
            var arrId1 = -1;
            for (var z = 0; z < shipList.length; z++) {
                if (shipList[z].userId == sId) { arrId1 = z; }
            }
            var f = shipList[arrId1].facing;
            var x = shipList[arrId1].xCord;
            var y = shipList[arrId1].yCord;
            var a = 1;
            if (f == 60) a = 2;
            if (f == 120) a = 3;
            if (f == 180) a = 4;
            if (f == 240) a = 5;
            if (f == 300) a = 6;
            a += m;

            if (a == 1 || a == 7) { y--; }
            if (a == 2) { if (x % 2 != 0) y--; x++; }
            if (a == 3) { if (x % 2 == 0) y++; x++; }
            if (a == 4) { y++; }
            if (a == 5) { if (x % 2 == 0) y++; x--; }
            if (a == 6 || a == 0) { if (x % 2 != 0) y--; x--; }
            // color square x, y




            var str = '<div class="posShipMove"><i class="fa-regular fa-circle-arrow-up"></i></div>';
            $('#shipLayer').append(str);

            //var pf = 0; var px = 0; var py = 0;
            var px = ((x - 1) * 37.5) + 17;
            var py = ((y - 1) * 43.3) + ((x % 2 == 1) ? 0 : 22) + 18;
            var pf = f + (60 * t);
            //alert('x=' + x + ' y=' + y + ' px=' + px + ' py=' + py + ' t=' + t)

            $('.posShipMove').css({
                'left': px, 'top': py,

        function displayWeaponArc(weapon) {
            var str = '';
            if (weapon.startP == 300 && weapon.arc == 120) { str = 'FA'; }
            if (weapon.startP == 240 && weapon.arc == 240) { str = 'FX'; }
            if (weapon.startP == 120 && weapon.arc == 120) { str = 'RA'; }
            if (weapon.startP == 60 && weapon.arc == 240) { str = 'RX'; }
            if (weapon.startP == 0 && weapon.arc == 360) { str = '360'; }

            if (weapon.startP == 0 && weapon.arc == 120) { str = 'RF R'; }
            if (weapon.startP == 60 && weapon.arc == 120) { str = 'R RR'; }
            if (weapon.startP == 180 && weapon.arc == 120) { str = 'L LR'; }
            if (weapon.startP == 240 && weapon.arc == 120) { str = 'LF L'; }

            if (weapon.startP == 0 && weapon.arc == 120 && weapon.startP2 == 180 && weapon.arc2 == 60) { str = 'RF R LR'; }
            if (weapon.startP == 240 && weapon.arc == 120 && weapon.startP2 == 120 && weapon.arc2 == 60) { str = 'LF L RR'; }

            if (weapon.startP == 0 && weapon.arc == 180) { str = 'RS'; }
            if (weapon.startP == 180 && weapon.arc == 180) { str = 'LS'; }
            if (weapon.startP == 270 && weapon.arc == 180) { str = ((weaponTypeId > 19) ? 'FP' : 'FH'); }

            if (weapon.weaponTypeId >= 30 && weapon.weaponTypeId <= 40) { str = ''; }
            return str;
        }
        function weaponInArc(weapon, arc) {
            var bValid = false;
            var end = weapon.startP + weapon.arc;
            if (weapon.arc == 360)
                bValid = true;
            else if (weapon.startP <= arc && arc <= end)
                bValid = true;
            else if (end >= 360) {
                if ((end - 360) >= arc)
                    bValid = true;
            }
            else if (weapon.arc2 > 0) {
                end = weapon.startP2 + weapon.arc2;
                if (weapon.startP2 <= arc && end <= arc)
                    bValid = true;
                else if (end >= 360) {
                    if (arc >= (end - 360))
                        bValid = true;
                }

            }
            return bValid;
        }

        // basic functions
        function findDist(sId1, sId2) {
            var x1, x2, y1, y2;
            for (var z = 0; z < shipList.length; z++) {
                if (shipList[z].userId == sId1) { x1 = shipList[z].xCord; y1 = shipList[z].yCord; }
                if (shipList[z].userId == sId2) { x2 = shipList[z].xCord; y2 = shipList[z].yCord; }
            }
            var d = 0;
            var dx = Math.abs(x1 - x2);
            var dy = Math.abs(y1 - y2);
            d = dx;
            var a = dy - Math.floor(dx / 2);
            if (((x1 % 2) == 0) && ((x2 % 2) == 1) && (y1 < y2)) a--;
            if (((x1 % 2) == 1) && ((x2 % 2) == 0) && (y1 > y2)) a--;
            if (a > 0) d += a;
            //$('#dataDiv').append('<div>x1=' + x1 + ' y1=' + y1 + ' x2=' + x2 + ' y2=' + y2 + ' dx=' + dx + ' dy=' + dy + ' a=' + a + ' d=' + d + '</div>')
            return d;
        }

        function shieldFacing(arc) {
            var s = 1;
            if (arc > 30 && arc <= 90) s = 2;
            if (arc > 90 && arc <= 150) s = 3;
            if (arc > 150 && arc <= 210) s = 4;
            if (arc > 210 && arc <= 270) s = 5;
            if (arc > 270 && arc <= 330) s = 6;
            return s;
        }

        function findFacing(selShip, tarShip) {
            var arrId1 = -1;
            var arrId2 = -2;
            for (var z = 0; z < shipList.length; z++) {
                if (shipList[z].userId == selShip) { arrId1 = z; }
                if (shipList[z].userId == tarShip) { arrId2 = z; }
            }

            var x1 = shipList[arrId1].xCord; var x2 = shipList[arrId2].xCord;
            var y1 = shipList[arrId1].yCord; var y2 = shipList[arrId2].yCord;
            var dx = (x2 - x1);
            var dy = (y2 - y1);
            var mx = dx * 0.866;
            var my = -dy;
            if ((x1 % 2 == 0) && ((x2 % 2) == 1)) my += 0.5;
            if ((x1 % 2 == 1) && ((x2 % 2) == 0)) my -= 0.5;

            //var s = '<div>selShip=' + selShip + ' x=' + shipList[arrId1].xCord + ' y=' + shipList[arrId1].yCord + ' f=' + shipList[arrId1].facing + '</div>';
            //s += '<div> tarShip=' + tarShip + ' x=' + shipList[arrId2].xCord + ' y=' + shipList[arrId2].yCord + '</div>';

            var angle = Math.round(Math.atan2(my, mx) * (180 / Math.PI) * 100) / 100;
            if (angle > 90)
                angle = 450 - angle;
            else
                angle = 90 - angle;
            angle -= shipList[arrId1].facing;
            if (angle >= 360) angle -= 360;
            if (angle < 0) angle += 360;

            //s += '<div>dx' + dx + ' dy=' + dy + '  mx=' + mx + ' my' + my + ' a=' + angle + '</div>';
            //$('#dataDiv').append(s);
            return angle;
        }

        function rollD6() {
            var n = (Math.floor(Math.random() * 6) + 1);
            return n;
        }
        function roll2D6() {
            var n = ((Math.floor(Math.random() * 6) + 1) + (Math.floor(Math.random() * 6) + 1));
            return n;

            //var str = '';

        function makeDraggableElement(el) {
            if (!el) {
                console.warn('makeDraggableElement called with a missing element (getElementById returned null) — skipping.');
                return;
            }
            var x1 = 0;
            var y1 = 0;
            var x2 = 0;
            var y2 = 0;

            el.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                e = e || window.event;
                x2 = e.clientX;
                y2 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                x1 = x2 - e.clientX;
                y1 = y2 - e.clientY;
                x2 = e.clientX;
                y2 = e.clientY;
                el.style.top = (el.offsetTop - y1) + 'px';
                el.style.left = (el.offsetLeft - x1) + 'px';
            }

            function closeDragElement() {
                document.onmousetop = null;
                document.onmousemove = null;
            }
        }


        function speedSort(a, b) {
            var speedA = parseInt(a.speed);
            var speedB = parseInt(b.speed);

            if (speedA < speedB)
                return -1;
            if (speedA > speedB)
                return 1;
            return 0;
        }
